[functions.send-push-test]
enabled = true
verify_jwt = false
import_map = "./functions/send-push-test/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-push-test/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-push-test/*.html" ]

[functions.send-push-reminders]
enabled = true
# pg_cron เรียกด้วย REMINDER_AUTH_KEY (plain string ไม่ใช่ JWT) แนบผ่าน header
# ชื่อเอง X-Reminder-Auth (ไม่ใช้ Authorization เพราะ Supabase gateway จะดัก
# ตรวจค่านั้นเองก่อนถึงโค้ดเราเสมอ ไม่ว่า verify_jwt จะปิดไว้หรือไม่ แล้ว
# reject ค่าที่ไม่ใช่ JWT/apikey ที่ถูกต้องทันที) ฟังก์ชันเช็ค key นี้เองภายใน
# (ดูรายละเอียดใน index.ts) จึงต้องปิด verify_jwt ไว้ด้วย
verify_jwt = false
import_map = "./functions/send-push-reminders/deno.json"
entrypoint = "./functions/send-push-reminders/index.ts"

[functions.send-event-reminders]
enabled = true
# เหตุผลเดียวกับ send-push-reminders ด้านบน - ใช้ REMINDER_AUTH_KEY ไม่ใช่ JWT
verify_jwt = false
entrypoint = "./functions/send-event-reminders/index.ts"
